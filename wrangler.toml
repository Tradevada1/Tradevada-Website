name = "tradevada-website"
compatibility_date = "2026-05-31"
main = "src/index.js"

# Serve the static site in ./public, and let the Worker handle /api/* routes.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# Optional vars. Uncomment + fill to auto-add newsletter subscribers to a
# Resend Audience (your contact list for conversion campaigns). NOTE: this
# requires the RESEND_API_KEY secret to have FULL access — adding contacts
# isn't allowed with a Sending-only key.
[vars]
RESEND_AUDIENCE_ID = "3e5c7c86-20ee-49a6-8595-c62a56cd1588"
# CONTACT_TO = "support@tradevada.com"
# MAIL_FROM = "Tradevada <noreply@tradevada.com>"
